<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация - Акт осмотра</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        .auth-card {
            max-width: 400px;
            margin: 0 auto;
        }
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffffff 0%, #2e75b5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        .splash-screen img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .splash-screen.hidden {
            opacity: 0;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Заставка -->
    <div id="splashScreen" class="splash-screen">
        <img id="splashImage" src="https://onetor.ru/uploads/posts/2020-09/1599195433_1599195344071.png" alt="Заставка">
    </div>

    <div class="container auth-card">
        <div class="card-header">
            <h1>🔐 АКТ ОСМОТРА</h1>
            <p>Войдите в систему</p>
        </div>
        <div class="card-content">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" id="loginInput" placeholder="Введите логин">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="passwordInput" placeholder="Введите пароль">
            </div>
            <button class="btn-primary" onclick="login()" style="width: 100%;">Войти</button>
            <div id="authMessage" class="message"></div>
        </div>
    </div>

    <script>
        // Загрузка настроек заставки
        async function loadSplashSettings() {
            try {
                const response = await fetch('data/splash.json?v=' + Date.now());
                if (response.ok) {
                    const settings = await response.json();
                    const splashImg = document.getElementById('splashImage');
                    if (splashImg && settings.url) {
                        splashImg.src = settings.url;
                    }
                    if (settings.duration) {
                        setTimeout(() => {
                            const splash = document.getElementById('splashScreen');
                            if (splash) {
                                splash.classList.add('hidden');
                                setTimeout(() => splash.style.display = 'none', 500);
                            }
                        }, settings.duration * 1000);
                    }
                } else {
                    // Заставка по умолчанию
                    setTimeout(() => {
                        const splash = document.getElementById('splashScreen');
                        if (splash) {
                            splash.classList.add('hidden');
                            setTimeout(() => splash.style.display = 'none', 500);
                        }
                    }, 3000);
                }
            } catch(e) {
                setTimeout(() => {
                    const splash = document.getElementById('splashScreen');
                    if (splash) {
                        splash.classList.add('hidden');
                        setTimeout(() => splash.style.display = 'none', 500);
                    }
                }, 3000);
            }
        }

        // Загрузка пользователей
        async function loadUsers() {
            try {
                const response = await fetch('data/users.json?v=' + Date.now());
                if (response.ok) {
                    return await response.json();
                }
            } catch(e) {}
            return [
                { login: "admin", password: "12345", fullName: "Воронцов Евгений Олегович", position: "Главный инженер", role: "admin" },
                { login: "admin2", password: "12345", fullName: "Сидоров Андрей Петрович", position: "Технический специалист", role: "readonly" }
            ];
        }

        async function login() {
            const login = document.getElementById('loginInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            const authMessage = document.getElementById('authMessage');

            const users = await loadUsers();
            const user = users.find(u => u.login === login && u.password === password);

            if (!user) {
                authMessage.textContent = '❌ Неверный логин или пароль!';
                authMessage.className = 'message error';
                return;
            }

            // Сохраняем пользователя в sessionStorage (временно, на сессию)
            sessionStorage.setItem('currentUser', JSON.stringify(user));
            
            // Перенаправляем на выбор объекта
            window.location.href = 'objects.html';
        }

        loadSplashSettings();
    </script>
</body>
</html>
